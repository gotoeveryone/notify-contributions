name: CI

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Golang
        uses: actions/setup-go@v7.0.0
        with:
          go-version: "1.26.0"
          cache-dependency-path: |
            **/go.sum

      - name: Execute code check
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Golang
        uses: actions/setup-go@v7.0.0
        with:
          go-version: "1.26.0"
          cache-dependency-path: |
            **/go.sum

      - name: Execute test
        run: go test ./...
