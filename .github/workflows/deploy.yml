name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions: {}

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up Golang
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26.0"
          cache-dependency-path: |
            **/go.sum

      - name: Set up AWS SAM
        uses: aws-actions/setup-sam@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Build
        run: sam build

      - name: Deploy
        env:
          APP_SECRET_ARN: ${{ secrets.APP_SECRET_ARN }}
          GITHUB_USER_NAME: ${{ github.repository_owner }}
          GITLAB_USER_ID: ${{ secrets.GITLAB_USER_ID }}
        run: |
          sam deploy \
            --parameter-overrides \
            AppSecretArn="$APP_SECRET_ARN" \
            GithubUserName="$GITHUB_USER_NAME" \
            GitlabUserId="$GITLAB_USER_ID"

  notify:
    needs: deploy
    if: ${{ always() && (needs.deploy.result == 'success' || needs.deploy.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ needs.deploy.result == 'success' && ':white_check_mark: Deploy succeeded' || ':x: Deploy failed' }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "${{ needs.deploy.result == 'success' && ':white_check_mark: *Deploy succeeded*' || ':x: *Deploy failed*' }}"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Repository:*\n<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: View workflow
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    action_id: view_workflow
