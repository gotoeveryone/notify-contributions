AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: notify-contributions scheduled Lambda

Parameters:
  AppSecretArn:
    Type: String
    Description: Secrets Manager ARN that stores GitHub App values, GITLAB_TOKEN, SLACK_WEBHOOK_URL
  GithubUserName:
    Type: String
  GitlabUserId:
    Type: String

Resources:
  NotifyContributionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          APP_SECRET_ARN: !Ref AppSecretArn
          GITHUB_USER_NAME: !Ref GithubUserName
          GITLAB_USER_ID: !Ref GitlabUserId
          NOTIFY_TYPE: slack
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AppSecretArn
      Events:
        DailyRun:
          Type: Schedule
          Properties:
            # 15:00 UTC (same as GitHub Actions cron "0 15 * * *")
            Schedule: cron(0 15 * * ? *)
            Enabled: true

Outputs:
  NotifyContributionsFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt NotifyContributionsFunction.Arn
